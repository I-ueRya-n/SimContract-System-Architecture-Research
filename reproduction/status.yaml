automated_cold_start_check:
  type: context-isolated cold-start agent-executed machine-actionability check
  agent_model: claude-opus-4-8
  agent_harness: Claude Code subagent (Claude Agent SDK)
  environment: Linux WSL2 / x86_64 / Python 3.10.12 (same host across trials)
  trials: 3
  status: pass            # 3/3
  per_trial_content_hash: match
  per_trial_files_ok: true
  finding: >
    The README five-minute reproduction runs pytest immediately after
    `pip install -e .`, but pytest ships in the [dev] extra; all three trials
    self-recovered from pyproject.toml. Documentation fix targeted for v0.3.x.
  boundary: >
    Not a human reproducer; evidence of documentation machine-actionability
    under one model-and-harness configuration only, not human usability,
    general agent compatibility, or community adoption.

known_issue:
  id: newline-byte-integrity
  summary: >
    v0.3.0 evidence writers used text-mode writes; on platforms that rewrite
    newlines the on-disk bytes (CRLF; CSV CRCRLF) differed from the recorded
    per-file hashes (LF), so files_ok failed. Canonical content_hash and
    replay were unaffected.
  discovered_by: SL (independent Windows reproduction of v0.3.0)
  affects: v0.3.0 byte-level per-file verification on newline-translating platforms
  fixed_in: v0.3.1
  fix: writers emit canonical UTF-8 bytes and hash exactly the bytes written
  remediation_rerun:
    windows: pending      # rerun the final v0.3.1 archive on Windows
