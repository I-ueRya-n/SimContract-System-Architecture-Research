name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: test ${{ matrix.os }} py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (with dev extra)
        run: python -m pip install -e ".[dev]"
      - name: Unit tests
        run: python -m pytest -q
      - name: Reproduction smoke (content hash + files_ok + replay)
        run: python scripts/reproduction_smoke.py

  wheel-install:
    name: wheel install ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel
        run: |
          python -m pip install --upgrade build
          python -m build --wheel
      - name: Install the built wheel
        shell: bash
        run: python -m pip install dist/*.whl
      - name: CLI runs from installed package (outside the source tree)
        shell: bash
        run: |
          cd "$RUNNER_TEMP"
          python -m simcontract.cli domains
      - name: Reproduction smoke from installed package
        run: python scripts/reproduction_smoke.py
